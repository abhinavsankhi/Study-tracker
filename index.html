<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="theme-color" content="#0f172a"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="Exam Prep"/>
<title>Exam Prep Tracker</title>
<style>@import url("https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap");</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
:root{--bg:#0f172a;--card:#1e293b;--card2:#263347;--border:#334155;--text:#f1f5f9;--muted:#94a3b8;--accent:#38bdf8;--green:#4ade80;--yellow:#fbbf24;--pink:#f472b6;--purple:#a78bfa;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:"DM Sans",sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:80px;}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#1a2540;border-top:1px solid var(--border);display:flex;z-index:100;}
.nav-btn{flex:1;padding:10px 2px 6px;background:none;border:none;color:var(--muted);font-size:9px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;}
.nav-btn.active{color:var(--accent);}
.nav-btn svg{width:20px;height:20px;}
.page{display:none;padding:14px;max-width:560px;margin:0 auto;}
.page.active{display:block;}
.ph{margin-bottom:14px;}
.ph h1{font-family:"Syne",sans-serif;font-size:22px;font-weight:800;}
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:14px;margin-bottom:12px;}
.card label{font-size:10px;color:var(--muted);font-weight:700;text-transform:uppercase;display:block;margin-bottom:8px;}
.btn{padding:9px 18px;border-radius:10px;border:none;font-size:12px;font-weight:700;cursor:pointer;}
.btn-accent{background:var(--accent);color:#0f172a;}
.btn-green{background:var(--green);color:#0f172a;}
.btn-red{background:#ef4444;color:#fff;}
.btn-ghost{background:var(--card2);color:var(--muted);border:1px solid var(--border);}
.notif{position:fixed;top:14px;left:50%;transform:translateX(-50%);background:var(--green);color:#0f172a;padding:9px 20px;border-radius:28px;font-weight:700;font-size:12px;z-index:999;display:none;}
.today-summary{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
.summary-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px;text-align:center;}
.timer-card{background:linear-gradient(135deg,#0f2744,#1e293b);border:1px solid #2d4a7a;border-radius:18px;padding:18px 14px;margin-bottom:12px;text-align:center;}
.timer-display{font-family:"Syne",sans-serif;font-size:34px;font-weight:800;color:var(--accent);margin-bottom:14px;}
.hour-selector{display:flex;align-items:center;justify-content:center;gap:20px;}
.hour-btn{width:34px;height:34px;border-radius:9px;border:1px solid var(--border);background:var(--card2);color:var(--text);font-size:18px;font-weight:700;}
.hour-display{font-family:"Syne",sans-serif;font-size:26px;font-weight:800;color:var(--accent);}
.notes-textarea{width:100%;background:var(--card2);border:1px solid var(--border);border-radius:10px;color:var(--text);padding:10px;min-height:80px;outline:none;}
.save-btn{width:100%;padding:13px;background:linear-gradient(135deg,#0284c7,#0ea5e9);border:none;border-radius:13px;color:#fff;font-weight:700;cursor:pointer;}
/* Syllabus styling */
.exam-tab{padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:var(--card2);color:var(--muted);margin-right:5px;cursor:pointer;}
.exam-tab.active{background:var(--accent);color:#0f172a;}
.topic-card{background:var(--card);border-radius:12px;padding:10px;margin-bottom:8px;border-left:4px solid var(--accent);}
</style>
</head>
<body>
<div class="notif" id="notif"></div>

<div class="page active" id="page-today">
  <div class="ph"><h1>📚 Today's Study</h1><p id="today-date"></p></div>
  
  <div class="timer-card">
    <div class="timer-display" id="timer-display">00:00:00</div>
    <div class="timer-btns">
      <button class="btn btn-green" id="tbtn-start" onclick="timerStart()">▶ Start</button>
      <button class="btn btn-red" id="tbtn-stop" onclick="timerStop()" style="display:none">⏹ Stop</button>
    </div>
  </div>

  <div class="card"><label>⏱ Hours Studied</label>
    <div class="hour-selector">
      <button class="hour-btn" onclick="changeHours(-0.5)">−</button>
      <div class="hour-display" id="hour-display">0</div>
      <button class="hour-btn" onclick="changeHours(0.5)">+</button>
    </div>
  </div>

  <div class="card"><label>📝 Notes</label>
    <textarea class="notes-textarea" id="input-notes" placeholder="What did you learn today?"></textarea>
  </div>
  
  <button class="save-btn" onclick="saveToday()">💾 Save Progress</button>
</div>

<div class="page" id="page-syllabus">
  <div class="ph"><h1>📋 Syllabus</h1></div>
  <div id="syllabus-content">
    </div>
</div>

<nav class="bottom-nav">
  <button class="nav-btn active" onclick="showPage('today',this)">Today</button>
  <button class="nav-btn" onclick="showPage('syllabus',this)">Syllabus</button>
</nav>

<script>
let currentHours = 0;
let studyData = JSON.parse(localStorage.getItem('ep_study_v1') || '{}');

function changeHours(delta) {
    currentHours = Math.max(0, currentHours + delta);
    document.getElementById('hour-display').textContent = currentHours;
}

function saveToday() {
    const today = new Date().toISOString().split('T')[0];
    studyData[today] = {
        hours: currentHours,
        notes: document.getElementById('input-notes').value
    };
    localStorage.setItem('ep_study_v1', JSON.stringify(studyData));
    showNotif("✅ Progress saved!");
}

function showPage(id, btn) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('page-' + id).classList.add('active');
    btn.classList.add('active');
}

function showNotif(msg) {
    const n = document.getElementById('notif');
    n.textContent = msg;
    n.style.display = 'block';
    setTimeout(() => n.style.display = 'none', 2000);
}

// Service Worker Registration
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
}
</script>
</body>
</html>
